<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EduGameHQ Skill Lab</title><style>
:root{--a:#2563eb;--b:#0f172a}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,var(--a),var(--b));color:white;display:grid;place-items:center;padding:18px}.game{width:min(920px,100%);background:rgba(15,23,42,.78);border:1px solid rgba(255,255,255,.18);border-radius:20px;box-shadow:0 24px 70px rgba(0,0,0,.25);overflow:hidden}.top{padding:26px 28px;background:rgba(255,255,255,.08)}h1{margin:0 0 8px;font-size:clamp(28px,5vw,48px);letter-spacing:0}.meta{opacity:.84;font-weight:700}.panel{padding:24px;display:grid;gap:18px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 12px;font-weight:800}.prompt{min-height:190px;border-radius:18px;background:white;color:#0f172a;display:grid;place-items:center;text-align:center;padding:26px}.question{font-size:clamp(25px,4vw,42px);font-weight:900;margin:0 0 12px}.hint{color:#475569;font-weight:700}.answers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}button{border:0;border-radius:14px;padding:15px 16px;font:inherit;font-weight:900;cursor:pointer}.answer{background:#fff;color:#111827}.answer:hover,.answer:focus{outline:3px solid rgba(255,255,255,.5)}.primary{background:#22c55e;color:#06210f}.status{min-height:28px;text-align:center;font-size:20px;font-weight:900}@media(max-width:620px){.answers{grid-template-columns:1fr}.top,.panel{padding:18px}.prompt{min-height:170px}}</style></head><body><main class="game"><section class="top"><h1 id="title">Skill Lab</h1><div class="meta" id="meta">EduGameHQ</div></section><section class="panel"><div class="stats"><span class="pill">Score <b id="score">0</b></span><span class="pill">Round <b id="round">0</b>/8</span><span class="pill">Streak <b id="streak">0</b></span></div><div class="prompt"><div><p class="question" id="question">Ready?</p><p class="hint" id="hint">Press start to begin.</p></div></div><div class="answers" id="answers"></div><button class="primary" id="start">Start Game</button><div class="status" id="status">Build confidence one quick round at a time.</div></section></main><script>
const params=new URLSearchParams(location.search);const title=params.get('title')||'Skill Lab';const cat=params.get('cat')||'puzzle';const topic=params.get('topic')||'logic';const mode=params.get('mode')||'practice';const colors={adventure:['#f97316','#0f172a'],arcade:['#ef4444','#111827'],art:['#ec4899','#111827'],coding:['#2563eb','#0f172a'],creative:['#8b5cf6','#111827'],geography:['#0ea5e9','#0f172a'],language:['#10b981','#111827'],math:['#f59e0b','#111827'],memory:['#7c3aed','#111827'],science:['#059669','#0f172a'],strategy:['#64748b','#111827']};document.documentElement.style.setProperty('--a',(colors[cat]||colors.puzzle||['#14b8a6'])[0]);document.documentElement.style.setProperty('--b',(colors[cat]||colors.puzzle||['','#111827'])[1]);document.getElementById('title').textContent=title;document.getElementById('meta').textContent=cat.toUpperCase()+' • '+topic+' • '+mode;const banks={math:[['8 + 7','15'],['6 x 4','24'],['30 / 5','6'],['12 - 9','3'],['Next: 3, 6, 9, ?','12']],language:[['Opposite of cold','hot'],['Spell the missing word: lear_ing','n'],['A group of words with meaning','sentence'],['Synonym of quick','fast']],geography:[['Capital of Japan','Tokyo'],['Largest ocean','Pacific'],['Brazil is in which continent?','South America'],['Flag with maple leaf','Canada']],science:[['Planet known as the red planet','Mars'],['Water changes to vapor by','evaporation'],['Force that pulls objects down','gravity'],['Animals with backbones are','vertebrates']],coding:[['Repeat while condition is true','loop'],['Stores a value','variable'],['True or false are','booleans'],['Find and fix a mistake','debug']],memory:[['Remember: star moon leaf. First item?','star'],['Remember: 4 9 2. Middle number?','9'],['Remember: red blue green. Last color?','green']],strategy:[['Best move: protect resources or spend all?','protect'],['Plan before acting means','strategy'],['Look one move ahead to','forecast']],art:[['Red + blue makes','purple'],['Light and dark difference is','contrast'],['Repeated visual unit','pattern']],creative:[['Beat uses repeated','rhythm'],['A new story starts with an','idea'],['Combine sounds in a','mix']],adventure:[['A map helps choose a','route'],['A hidden hint is a','clue'],['Before crossing, check the','path']],arcade:[['Fast response is','reaction'],['Avoid danger by','dodging'],['More correct hits create a','combo']]};const pool=banks[cat]||banks.math;let score=0,round=0,streak=0;function choices(answer){const extras=['logic','map','pattern','energy','route','color','array','focus','tempo','score','capital','motion'].filter(x=>x.toLowerCase()!==answer.toLowerCase());return [answer,...extras.sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5)}function render(){document.getElementById('round').textContent=round+1;const [q,a]=pool[round%pool.length];document.getElementById('question').textContent=q;document.getElementById('hint').textContent='Topic: '+topic+'. Choose the best answer.';const box=document.getElementById('answers');box.innerHTML='';for(const c of choices(a)){const btn=document.createElement('button');btn.className='answer';btn.textContent=c;btn.onclick=()=>pick(c,a);box.appendChild(btn)}}function pick(c,a){if(c.toLowerCase()===a.toLowerCase()){streak++;score+=10+streak;document.getElementById('status').textContent='Correct. Keep the streak going.'}else{streak=0;document.getElementById('status').textContent='Answer: '+a+'. Try the next one.'}round++;document.getElementById('score').textContent=score;document.getElementById('streak').textContent=streak;if(round>=8){document.getElementById('question').textContent='Finished';document.getElementById('hint').textContent='Final score: '+score+'. Press start to replay.';document.getElementById('answers').innerHTML='';document.getElementById('round').textContent=8}else setTimeout(render,260)}document.getElementById('start').onclick=()=>{score=0;round=0;streak=0;document.getElementById('score').textContent=0;document.getElementById('streak').textContent=0;document.getElementById('status').textContent='Game started.';render()};
</script></body></html>
